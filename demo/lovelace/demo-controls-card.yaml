# Copy this entire card into any Lovelace view (visual editor → Add card → Manual).
type: vertical-stack
title: Demo Controls
cards:
  - type: entities
    title: Activity
    show_header_toggle: false
    entities:
      - entity: input_select.nvision_activity
        name: Activity

  - type: entities
    title: Environment
    show_header_toggle: false
    entities:
      - entity: input_number.nvision_air_quality_index
        name: Air particulates
      - entity: input_number.nvision_tank_level
        name: Tank level
      - entity: input_number.nvision_diningroom_noise
        name: Dining room noise
      - entity: input_number.nvision_reactor_temperature
        name: Reactor temp
      - entity: input_number.nvision_wind_speed
        name: Wind speed

  - type: entities
    title: Power
    show_header_toggle: false
    entities:
      - entity: input_number.nvision_power_draw
        name: PC power draw
      - entity: input_number.nvision_battery_level
        name: Battery level
