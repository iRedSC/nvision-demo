          {% set increment = (power * 0.00003) + ((range(1, 5) | random) / 100) %}
          {{ (current + increment) | round(2) }}
    - service: input_number.set_value
      target:
        entity_id: input_number.nvision_oven_power_cost
      data:
        value: >
          {% set power = states('input_number.nvision_oven_power') | float(0) %}
          {% set current = states('input_number.nvision_oven_power_cost') | float(0) %}
          {% set increment = (power * 0.00003) + ((range(1, 5) | random) / 100) %}
          {{ (current + increment) | round(2) }}
