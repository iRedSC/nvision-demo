- id: nvision_door_simulate
  alias: Nvision Door Simulator
  description: Toggle the door open and closed every 5–30 seconds.
  trigger:
    - platform: homeassistant
      event: start
  action:
    - repeat:
        while: true
        sequence:
          - delay:
              seconds: "{{ range(5, 31) | random }}"
          - service: input_boolean.toggle
            target:
              entity_id: input_boolean.nvision_door

- id: nvision_laundry_cycle_loop
  alias: Nvision Laundry Cycle Loop
  description: Keep the laundry timer running on a 2-minute loop.
  trigger:
    - platform: homeassistant
      event: start
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.nvision_cycle
  action:
    - service: timer.start
      target:
        entity_id: timer.nvision_cycle

- id: nvision_livingroom_noise_simulate
  alias: Nvision Living Room Noise Simulator
  trigger:
    - platform: time_pattern
      seconds: "/4"
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.nvision_livingroom_noise
      data:
        value: >
          {% set current = states('input_number.nvision_livingroom_noise') | float(38) %}
          {% set delta = range(-6, 7) | random %}
          {{ [[current + delta, 18] | max, 88] | min }}

- id: nvision_outside_temp_simulate
  alias: Nvision Outside Temperature Simulator
  trigger:
    - platform: time_pattern
      minutes: "/2"
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.nvision_temperature
      data:
        value: >
          {% set current = states('input_number.nvision_temperature') | float(12) %}
          {% set delta = (range(-10, 11) | random) / 10 %}
          {{ [[current + delta, -8] | max, 38] | min | round(1) }}

