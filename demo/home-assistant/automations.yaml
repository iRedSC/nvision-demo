      seconds: "/6"
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.nvision_washer_power
      data:
        value: >
          {% set roll = range(0, 10) | random %}
          {% if roll < 4 %}
            {{ range(0, 60) | random }}
          {% elif roll < 8 %}
            {{ range(180, 760) | random }}
          {% else %}
            {{ range(40, 180) | random }}
          {% endif %}

