- id: nvision_appliance_costs_simulate
  alias: Nvision Appliance Cost Simulator
  description: Increment appliance running costs based on current power draw.
  trigger:
    - platform: time_pattern
      seconds: "/30"
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.nvision_pc_power_cost
      data:
        value: >
          {% set power = states('input_number.nvision_power_draw') | float(0) %}
          {% set current = states('input_number.nvision_pc_power_cost') | float(0) %}
          {% set increment = (power * 0.00003) + ((range(1, 6) | random) / 100) %}
          {{ (current + increment) | round(2) }}
    - service: input_number.set_value
      target:
        entity_id: input_number.nvision_fridge_power_cost
      data:
        value: >
          {% set power = states('input_number.nvision_fridge_power') | float(0) %}
          {% set current = states('input_number.nvision_fridge_power_cost') | float(0) %}
          {% set increment = (power * 0.00003) + ((range(1, 4) | random) / 100) %}
          {{ (current + increment) | round(2) }}
    - service: input_number.set_value
      target:
        entity_id: input_number.nvision_washer_power_cost
      data:
        value: >
          {% set power = states('input_number.nvision_washer_power') | float(0) %}
          {% set current = states('input_number.nvision_washer_power_cost') | float(0) %}
          {% set increment = (power * 0.00003) + ((range(1, 6) | random) / 100) %}
          {{ (current + increment) | round(2) }}
    - service: input_number.set_value
      target:
        entity_id: input_number.nvision_dryer_power_cost
      data:
        value: >
          {% set power = states('input_number.nvision_dryer_power') | float(0) %}
          {% set current = states('input_number.nvision_dryer_power_cost') | float(0) %}
          {% set increment = (power * 0.00003) + ((range(2, 6) | random) / 100) %}
          {{ (current + increment) | round(2) }}
    - service: input_number.set_value
      target:
        entity_id: input_number.nvision_dishwasher_power_cost
      data:
        value: >
          {% set power = states('input_number.nvision_dishwasher_power') | float(0) %}
