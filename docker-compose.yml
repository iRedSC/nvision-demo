services:
  homeassistant:
    image: homeassistant/home-assistant:stable
    restart: unless-stopped
    ports:
      - "${HA_PORT:-8123}:8123"
    environment:
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - homeassistant-config:/config
      - ./demo/home-assistant/configuration.yaml:/config/configuration.yaml:ro
      - ./www/nvision:/config/www/nvision:ro

volumes:
  homeassistant-config:
